<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<title>30,000 Points Map — MapLibre + deck.gl</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/deck.gl@9.0.38/dist.min.js"></script>
<style>
  html, body, #map { height: 100%; margin: 0; padding: 0; }
  #status {
    position: absolute; top: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.7); color: #fff; padding: 8px 12px;
    border-radius: 6px; font-family: sans-serif; font-size: 13px;
  }
</style>
</head>
<body>
<div id="map"></div>
<div id="status">กำลังโหลดจุด...</div>

<script>
const { DeckGL, ScatterplotLayer } = deck;

const map = new maplibregl.Map({
  container: "map",
  style: "https://tiles.openfreemap.org/styles/liberty",
  center: [100.523, 13.736],
  zoom: 10,
});

const deckOverlay = new deck.MapboxOverlay({ layers: [] });
map.addControl(deckOverlay);

fetch("/api/points")
  .then((r) => r.json())
  .then((points) => {
    document.getElementById("status").textContent = `แสดงผล ${points.length.toLocaleString()} จุด`;

    const layer = new ScatterplotLayer({
      id: "points-layer",
      data: points,
      getPosition: (d) => [d.lng, d.lat],
      getRadius: 25,
      radiusUnits: "meters",
      getFillColor: [255, 80, 0, 200],
      pickable: true,
      stroked: false,
      radiusMinPixels: 2,
      radiusMaxPixels: 8,
    });

    deckOverlay.setProps({ layers: [layer] });
  })
  .catch((err) => {
    document.getElementById("status").textContent = "โหลดข้อมูลล้มเหลว: " + err.message;
  });
</script>
</body>
</html>
